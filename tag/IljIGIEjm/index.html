<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转

      }
    })

  hljs.initHighlightingOnLoad();

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

          &lt;h1 id=&#34;reactor&#34;&gt;Reactor&lt;/h1&gt;
&lt;p&gt;&lt;img src=&#34;https://i.loli.net/2021/04/15/TdoGwYXcmiNWRDn.png&#34; alt=&#34;QQ图片20210415175812.png&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
注：很多网络库的实现并非刻板的遵循上图中的架构，例如muduo，将Handler和EventHandler以Channel类表示。&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Handler：本质上表示一种资源（文件描述符、socket描述符），该资源可以产生事件，所以也可以理解为事件源。&lt;/li&gt;
&lt;li&gt;Synchronous Event Demultiplexer：本身是一个系统调用，用于同时等待多个事件发生。对应于Linux下的IO多路复用机制：select、poll、epoll。&lt;/li&gt;
&lt;li&gt;Event Handler：事件处理器，与Handler绑定，指示当Handler产生事件时应如何去处理。&lt;/li&gt;
&lt;li&gt;Initiation Dispatcher：模式中的核心Reactor角色，提供了事件的注册和删除等设施。它通过Demultiplexer来等待Handler产生事件，一旦有事件产生，针对每个事件调用其对应的Event Handler完成事件处理。&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;从一个Reactor模式网络库使用者的角度来看，它提供了这样一种功能：我告诉它感兴趣的事件（注册事件源），以及事件的处理方式（注册回调函数），当有事件源产生了事件时，Reactor会去调用对应事件的处理器，完成事件的处理。&lt;/p&gt;
&lt;h1 id=&#34;proactor&#34;&gt;Proactor&lt;/h1&gt;
&lt;p&gt;和Reactor模式的区别在于对于socket的读写操作是由谁来完成。Reactor模式下，监测到的事件是“可读”or“可写”。即事件处理的过程中需要包含主动对socket读取和写入的过程。而在Proactor模式下， 监测到的事件是“读取完毕”or“写入完毕”。事件处理过程不需要主动的读或写socket，这个读写过程已经由&lt;strong&gt;内核&lt;/strong&gt;完成了。&lt;br&gt;
这里可能会有疑问，诸如muduo这样的网络库，注册事件回调时也不用考虑对socket的读写，而是可以直接操作buffer中的数据呀。是这样没错，但是这个屁股是网络库帮你擦的，而不是内核，读写操作依然是在用户态线程中完成的。使用同步IO方式无法实现真正的Proactor模式，但是可以将之封装为与Proactor模式相同的接口，这样在用户的层面上就和Proactor模式的使用方法一致了。&lt;/p&gt;
&lt;hr&gt;
&lt;p&gt;以下为个人理解部分：&lt;br&gt;
为什么muduo和asio，注册的回调函数都是在数据已经被读取完毕的前提下，而muduo自称是reactor模式，boost自称是proactor模式呢？&lt;br&gt;
asio提供了这样一个函数&lt;code&gt;asio::ip::tcp::socket::async_read_some&lt;/code&gt;，第一个参数是读到的数据放在哪，第二个参数是读完了干啥。这是一个典型的proactor接口：我只关心“读取完毕”事件，所以注册过去的回调函数就是读完了干啥。而muduo则是通过注册onMessage函数，用户在注册该回调时，同样也是只用关心业务逻辑，读取的数据可以通过内置的buffer获取。但本质上，这是muduo提供给用户的封装好的更上层的接口。这个回调函数的实际意义是“每当收到客户端发来的消息之后应该干啥”，而不是“来了可读事件，我给你读完放到你指定的位置之后应该干啥”。muduo中与asio的&lt;code&gt;asio::ip::tcp::socket::async_read_some&lt;/code&gt;同层次的应该是在TcpConnection中将对socket的同步读取与用户onMessage封装到一起后作为回调注册给channel的过程，这显然是一个reactor接口。&lt;/p&gt;
&lt;p&gt;其实也可以这么理解，asio实现的接口显然是proactor接口，而且在windows下使用iocp实现的asio确确实实是真正的proactor模式。在linux下，虽然不是真正的proactor，但是提供了和windows下一致的接口，所以属于模拟的proactor，其实本质就是reactor。只不过因为有真正的proactor再加上全平台一样的接口，所以常常就称之为proactor模式了。&lt;br&gt;
而muduo只在linux下有实现，必然是reactor模型，但实际上封装出了类似于proactor的接口。&lt;/p&gt;
&lt;p&gt;再来个理解，asio中的调用形式是：执行一个异步的读，且给这个读一个回调函数读完了干啥。 而muduo是直接注册一个回调函数，告诉接受到消息了要干啥，但实际上经过层层包装，注册给channel的回调本质上还是有可读事件了应该干啥。&lt;/p&gt;

&lt;ul&gt;
&lt;li&gt;客户端：同1&lt;/li&gt;
&lt;li&gt;服务端：发送ACK后进入CLOSE_WAIT状态，开始做断开连接前的准备工作，准备好后，发送FIN ACK。这个消息是携带之前ACK的响应序列号的，只要这个消息没丢，客户端可以凭借这个FIN ACK包中的响应序号直接从FIN-WAIT-1状态进入TIME_WAIT状态&lt;/li&gt;
&lt;/ul&gt;
&lt;ol start=&#34;3&#34;&gt;
&lt;li&gt;服务端FIN ACK丢包&lt;/li&gt;
&lt;/ol&gt;
&lt;ul&gt;
&lt;li&gt;客户端：如果2中的ACK丢了，则客户端此时处于FIN-WAIT-1状态，同1。如果2中的ACK没丢，则进入FIN-WAIT-2状态，原地等待。但FIN-WAIT-2可以通过&lt;code&gt;tcp_fin_timeout&lt;/code&gt;参数设置超时时间，超过时间直接转到CLOSED&lt;/li&gt;
&lt;li&gt;服务端：迟迟没收到客户端确认，超时重传&lt;/li&gt;
&lt;/ul&gt;
&lt;ol start=&#34;4&#34;&gt;
&lt;li&gt;客户端ACK丢包&lt;/li&gt;
&lt;/ol&gt;
&lt;ul&gt;
&lt;li&gt;客户端：进入TIME_WAIT状态，开始2MSL的等待&lt;/li&gt;
&lt;li&gt;服务端：没有收到ACK，会重传FIN ACK，直到服务端重试超时后主动断开。或等待新的客户端接入后，收到服务端重试的FIN ACK消息后，回复RST消息，收到RST消息后，服务端复位&lt;/li&gt;
&lt;/ul&gt;
&lt;ol start=&#34;5&#34;&gt;
&lt;li&gt;第二次挥手后，服务端跑路&lt;/li&gt;
&lt;/ol&gt;
&lt;ul&gt;
&lt;li&gt;客户端：进入FIN-WAIT-2状态，等待服务端段FIN。但可以设置超时时间&lt;/li&gt;
&lt;li&gt;服务端：跑路了&lt;/li&gt;
&lt;/ul&gt;
&lt;ol start=&#34;6&#34;&gt;
&lt;li&gt;第二次挥手后，客户端跑路&lt;/li&gt;
&lt;/ol&gt;
&lt;ul&gt;
&lt;li&gt;客户端：跑路了&lt;/li&gt;
&lt;li&gt;服务端：发送的FIN ACK没有接收端，会不断超时重传，此时服务端处于LAST-ACK状态。此时，超过一定时间后，服务端主动断开。或有新的客户端接入，会发送SYN建立连接，此时SYN被忽略，并直接恢复FIN ACK，新客户端收到后会回复RST，复位服务端&lt;/li&gt;
&lt;/ul&gt;

          &lt;h1 id=&#34;lru&#34;&gt;LRU&lt;/h1&gt;
&lt;p&gt;LRU(Least Recently Used)，即最近最少使用。其主要思想是：如果数据最近被访问过，那么将来被访问的几率也更高。&lt;br&gt;
使用双向链表存储，用unordered_map作索引，以实现O(1)的查询和置换。&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-c++&#34;&gt;using Node = pair&amp;lt;int, int&amp;gt;;

class LRUCache
{
public:
	LRUCache(int capacity)
		:capacity_(capacity){}
	void set(int key,int value)
	{
		auto iter = mp_.find(key);
		// 在缓存中
		if (iter != mp_.end())
		{
			// 将页面移动至链表头部
			list_.erase(iter-&amp;gt;second);
			list_.emplace_back(key, value);
			mp_[key] = list_.begin();
		}
		// 不在缓存中
		else
		{
			// 缓存空间满
			if (list_.size() &amp;gt;= capacity_)
			{
				// 删除链表尾部页面，以及mp中的缓存
				mp_.erase(list_.back().first);
				list_.pop_back();
			}
			// 装入新页面
			list_.emplace_front(key, value);
			mp_[key] = list_.begin();
		}
	}
	int get(int key)
	{
		auto iter = mp_.find(key);
		// 页面不存在
		if (iter == mp_.end())
		{
			return -1;
		}
		// 页面存在，要将其移动至链表头部
		list_.emplace_front(key, iter-&amp;gt;second-&amp;gt;second);
		list_.erase(iter-&amp;gt;second);

		mp_[key] = list_.begin();
		return iter-&amp;gt;second-&amp;gt;second;
	}
private:
	int capacity_;
	int node_num_;
	list&amp;lt;Node&amp;gt; list_;
	unordered_map&amp;lt;int, list&amp;lt;Node&amp;gt;::iterator&amp;gt; mp_;
};
int main()
{
	LRUCache lru(2);
	lru.set(1, 1);
	lru.set(2, 2);
	cout &amp;lt;&amp;lt; lru.get(1)&amp;lt;&amp;lt;endl;
	lru.set(3, 3);
	cout &amp;lt;&amp;lt; lru.get(2)&amp;lt;&amp;lt;endl;
	lru.set(4, 4);
	cout &amp;lt;&amp;lt; lru.get(1)&amp;lt;&amp;lt;endl;
	cout &amp;lt;&amp;lt; lru.get(3)&amp;lt;&amp;lt;endl;
	cout &amp;lt;&amp;lt; lru.get(4)&amp;lt;&amp;lt;endl;
	cin.get();
    // 1 -1 -1 3 4
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h1 id=&#34;lfu&#34;&gt;LFU&lt;/h1&gt;
&lt;p&gt;LFU(Least frequently used)，最不经常使用。其主要思想是：如果一个数据在最近一段时间内使用次数很少，那么在将来一段时间内被使用的可能性也很小。&lt;br&gt;
使用双ordered_map，一个用来查找对应页面，一个用来查找对应计数的页面链表&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-c++&#34;&gt;struct Node
{
	int key, value, count;
	Node(int k,int v,int c):key(k),value(v),count(c){}
};
class LFUCache
{
public:
	LFUCache(int capacity)
		:capacity_(capacity){}
	int get(int key)
	{
		auto iter = mp_key.find(key);
		// 页面存在
		if (iter != mp_key.end())
		{
			int cnt = iter-&amp;gt;second-&amp;gt;count;
			int val = iter-&amp;gt;second-&amp;gt;value;
			// 访问次数+1，放到对应的链表头部
			mp_count[cnt + 1].emplace_front(iter-&amp;gt;second-&amp;gt;key,val, cnt + 1);
			mp_count[cnt].erase(iter-&amp;gt;second);
			// 更新最小访问次数，如果访问为N次的页面已经全部被移除，则最小访问次数为N+1
			if (min_count_ == cnt &amp;amp;&amp;amp; mp_count[cnt].empty())
				++min_count_;
			mp_key[key] = mp_count[cnt + 1].begin();
			return val;
		}
		return -1;
	}
	void set(int key, int value)
	{
		auto iter = mp_key.find(key);
		// 更新
		if (iter != mp_key.end())
		{
			get(key);
			auto new_pos_iter = mp_key[key];
			new_pos_iter-&amp;gt;value = value;
		}
		// 插入新节点
		else
		{
			// 满了
			if (mp_key.size() &amp;gt;= capacity_)
			{
				// 删除计数最少且最早出现的
				int need_delete_key = mp_count[min_count_].back().key;
				mp_count[min_count_].pop_back();
				mp_key.erase(need_delete_key);
			}
			// 新加入的引用计数为1
			mp_count[1].emplace_front(key, value, 1);
			mp_key[key] = mp_count[1].begin();
			// 插入新节点，所以最小计数必然为1
			min_count_ = 1;
		}
	}
private:
	unordered_map&amp;lt;int, list&amp;lt;Node&amp;gt;::iterator&amp;gt; mp_key;
	unordered_map&amp;lt;int, list&amp;lt;Node&amp;gt;&amp;gt; mp_count;
	int min_count_ = 1;
	int capacity_;
};

int main()
{
	LFUCache lfu(2);
	lfu.set(1, 1);
	lfu.set(2, 2);
	cout &amp;lt;&amp;lt; lfu.get(1) &amp;lt;&amp;lt; endl;
	lfu.set(3, 3);
	cout &amp;lt;&amp;lt; lfu.get(2) &amp;lt;&amp;lt; endl;
	cout &amp;lt;&amp;lt; lfu.get(3) &amp;lt;&amp;lt; endl;
	lfu.set(4, 4);
	cout &amp;lt;&amp;lt; lfu.get(1) &amp;lt;&amp;lt; endl;
	cout &amp;lt;&amp;lt; lfu.get(3) &amp;lt;&amp;lt; endl;
	cout &amp;lt;&amp;lt; lfu.get(4) &amp;lt;&amp;lt; endl;
	cin.get();
	// 1 -1 3 -1 3 4
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h1 id=&#34;区别&#34;&gt;区别&lt;/h1&gt;
&lt;p&gt;二者的区别主要在于，LRU以最近使用时间为参考，LFU以引用计数和最近使用时间两个维度为参考。&lt;/p&gt;

<script>
  // var escape = "[{&#34;content&#34;:&#34;&lt;h1 id=\&#34;reactor\&#34;&gt;Reactor&lt;/h1&gt;\n&lt;p&gt;&lt;img src=\&#34;https://i.loli.net/2021/04/15/TdoGwYXcmiNWRDn.png\&#34; alt=\&#34;QQ图片20210415175812.png\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n注：很多网络库的实现并非刻板的遵循上图中的架构，例如muduo，将Handler和EventHandler以Channel类表示。&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Handler：本质上表示一种资源（文件描述符、socket描述符），该资源可以产生事件，所以也可以理解为事件源。&lt;/li&gt;\n&lt;li&gt;Synchronous Event Demultiplexer：本身是一个系统调用，用于同时等待多个事件发生。对应于Linux下的IO多路复用机制：select、poll、epoll。&lt;/li&gt;\n&lt;li&gt;Event Handler：事件处理器，与Handler绑定，指示当Handler产生事件时应如何去处理。&lt;/li&gt;\n&lt;li&gt;Initiation Dispatcher：模式中的核心Reactor角色，提供了事件的注册和删除等设施。它通过Demultiplexer来等待Handler产生事件，一旦有事件产生，针对每个事件调用其对应的Event Handler完成事件处理。&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;从一个Reactor模式网络库使用者的角度来看，它提供了这样一种功能：我告诉它感兴趣的事件（注册事件源），以及事件的处理方式（注册回调函数），当有事件源产生了事件时，Reactor会去调用对应事件的处理器，完成事件的处理。&lt;/p&gt;\n&lt;h1 id=\&#34;proactor\&#34;&gt;Proactor&lt;/h1&gt;\n&lt;p&gt;和Reactor模式的区别在于对于socket的读写操作是由谁来完成。Reactor模式下，监测到的事件是“可读”or“可写”。即事件处理的过程中需要包含主动对socket读取和写入的过程。而在Proactor模式下， 监测到的事件是“读取完毕”or“写入完毕”。事件处理过程不需要主动的读或写socket，这个读写过程已经由&lt;strong&gt;内核&lt;/strong&gt;完成了。&lt;br&gt;\n这里可能会有疑问，诸如muduo这样的网络库，注册事件回调时也不用考虑对socket的读写，而是可以直接操作buffer中的数据呀。是这样没错，但是这个屁股是网络库帮你擦的，而不是内核，读写操作依然是在用户态线程中完成的。使用同步IO方式无法实现真正的Proactor模式，但是可以将之封装为与Proactor模式相同的接口，这样在用户的层面上就和Proactor模式的使用方法一致了。&lt;/p&gt;\n&lt;hr&gt;\n&lt;p&gt;以下为个人理解部分：&lt;br&gt;\n为什么muduo和asio，注册的回调函数都是在数据已经被读取完毕的前提下，而muduo自称是reactor模式，boost自称是proactor模式呢？&lt;br&gt;\nasio提供了这样一个函数&lt;code&gt;asio::ip::tcp::socket::async_read_some&lt;/code&gt;，第一个参数是读到的数据放在哪，第二个参数是读完了干啥。这是一个典型的proactor接口：我只关心“读取完毕”事件，所以注册过去的回调函数就是读完了干啥。而muduo则是通过注册onMessage函数，用户在注册该回调时，同样也是只用关心业务逻辑，读取的数据可以通过内置的buffer获取。但本质上，这是muduo提供给用户的封装好的更上层的接口。这个回调函数的实际意义是“每当收到客户端发来的消息之后应该干啥”，而不是“来了可读事件，我给你读完放到你指定的位置之后应该干啥”。muduo中与asio的&lt;code&gt;asio::ip::tcp::socket::async_read_some&lt;/code&gt;同层次的应该是在TcpConnection中将对socket的同步读取与用户onMessage封装到一起后作为回调注册给channel的过程，这显然是一个reactor接口。&lt;/p&gt;\n&lt;p&gt;其实也可以这么理解，asio实现的接口显然是proactor接口，而且在windows下使用iocp实现的asio确确实实是真正的proactor模式。在linux下，虽然不是真正的proactor，但是提供了和windows下一致的接口，所以属于模拟的proactor，其实本质就是reactor。只不过因为有真正的proactor再加上全平台一样的接口，所以常常就称之为proactor模式了。&lt;br&gt;\n而muduo只在linux下有实现，必然是reactor模型，但实际上封装出了类似于proactor的接口。&lt;/p&gt;\n&lt;p&gt;再来个理解，asio中的调用形式是：执行一个异步的读，且给这个读一个回调函数读完了干啥。 而muduo是直接注册一个回调函数，告诉接受到消息了要干啥，但实际上经过层层包装，注册给channel的回调本质上还是有可读事件了应该干啥。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;tan-jiu-reactor-mo-shi-yu-proactor-mo-shi&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;探究Reactor模式与Proactor模式&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2021-04-15 17:17:46&#34;,&#34;dateFormat&#34;:&#34;2021-04-15&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://cknightx.github.io/post/tan-jiu-reactor-mo-shi-yu-proactor-mo-shi/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;4 min read&#34;,&#34;time&#34;:230000,&#34;words&#34;:1090,&#34;minutes&#34;:4},&#34;description&#34;:&#34;Reactor\n\n注：很多网络库的实现并非刻板的遵循上图中的架构，例如muduo，将Handler和EventHandler以Channel类表示。\n\nHandler：本质上表示一种资源（文件描述符、socket描述符），该资源可以产生事件...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#reactor\&#34;&gt;Reactor&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#proactor\&#34;&gt;Proactor&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://i.loli.net/2021/04/14/PFfjywQZ7CcnRpG.png\&#34; alt=\&#34;3.png\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h1 id=\&#34;三次握手\&#34;&gt;三次握手&lt;/h1&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;2\&#34;&gt;&lt;img src=\&#34;https://i.loli.net/2021/04/14/YPsuEFmT8nh1LwW.png\&#34; alt=\&#34;1.png\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ol&gt;\n&lt;li&gt;客户端SYN丢包&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;客户端：在超时时间内没收到服务端的ACK，就会超时重传SYN数据包。&lt;/li&gt;\n&lt;li&gt;服务端：无感知&lt;/li&gt;\n&lt;/ul&gt;\n&lt;ol start=\&#34;2\&#34;&gt;\n&lt;li&gt;服务端SYN ACK丢包&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;客户端：认为服务端没收到SYN，所以触发重传，与1一致。&lt;/li&gt;\n&lt;li&gt;服务端：在超时时间没有收到客户端的ACK，同样触发重传。&lt;/li&gt;\n&lt;/ul&gt;\n&lt;ol start=\&#34;3\&#34;&gt;\n&lt;li&gt;客户端ACK丢包&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;客户端：进入了ESTABLISHED状态，认为连接已经建立。&lt;/li&gt;\n&lt;li&gt;服务端：因为没有收到最后一个ACK包，依然处于SYN-RCVD状态。而此时，如果服务端接收到客户端传来的数据包，则会认为连接已经建立，并进入ESTABLISHED状态。&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1 id=\&#34;四次挥手\&#34;&gt;四次挥手&lt;/h1&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;3\&#34;&gt;&lt;img src=\&#34;https://i.loli.net/2021/04/14/iwqReNflVFAZOyg.png\&#34; alt=\&#34;2.png\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ol&gt;\n&lt;li&gt;客户端FIN丢包&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;客户端：没收到ACK，超时重传&lt;/li&gt;\n&lt;li&gt;服务端：无感知&lt;/li&gt;\n&lt;/ul&gt;\n&lt;ol start=\&#34;2\&#34;&gt;\n&lt;li&gt;服务端ACK丢包&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;客户端：同1&lt;/li&gt;\n&lt;li&gt;服务端：发送ACK后进入CLOSE_WAIT状态，开始做断开连接前的准备工作，准备好后，发送FIN ACK。这个消息是携带之前ACK的响应序列号的，只要这个消息没丢，客户端可以凭借这个FIN ACK包中的响应序号直接从FIN-WAIT-1状态进入TIME_WAIT状态&lt;/li&gt;\n&lt;/ul&gt;\n&lt;ol start=\&#34;3\&#34;&gt;\n&lt;li&gt;服务端FIN ACK丢包&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;客户端：如果2中的ACK丢了，则客户端此时处于FIN-WAIT-1状态，同1。如果2中的ACK没丢，则进入FIN-WAIT-2状态，原地等待。但FIN-WAIT-2可以通过&lt;code&gt;tcp_fin_timeout&lt;/code&gt;参数设置超时时间，超过时间直接转到CLOSED&lt;/li&gt;\n&lt;li&gt;服务端：迟迟没收到客户端确认，超时重传&lt;/li&gt;\n&lt;/ul&gt;\n&lt;ol start=\&#34;4\&#34;&gt;\n&lt;li&gt;客户端ACK丢包&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;客户端：进入TIME_WAIT状态，开始2MSL的等待&lt;/li&gt;\n&lt;li&gt;服务端：没有收到ACK，会重传FIN ACK，直到服务端重试超时后主动断开。或等待新的客户端接入后，收到服务端重试的FIN ACK消息后，回复RST消息，收到RST消息后，服务端复位&lt;/li&gt;\n&lt;/ul&gt;\n&lt;ol start=\&#34;5\&#34;&gt;\n&lt;li&gt;第二次挥手后，服务端跑路&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;客户端：进入FIN-WAIT-2状态，等待服务端段FIN。但可以设置超时时间&lt;/li&gt;\n&lt;li&gt;服务端：跑路了&lt;/li&gt;\n&lt;/ul&gt;\n&lt;ol start=\&#34;6\&#34;&gt;\n&lt;li&gt;第二次挥手后，客户端跑路&lt;/li&gt;\n&lt;/ol&gt;\n&lt;ul&gt;\n&lt;li&gt;客户端：跑路了&lt;/li&gt;\n&lt;li&gt;服务端：发送的FIN ACK没有接收端，会不断超时重传，此时服务端处于LAST-ACK状态。此时，超过一定时间后，服务端主动断开。或有新的客户端接入，会发送SYN建立连接，此时SYN被忽略，并直接恢复FIN ACK，新客户端收到后会回复RST，复位服务端&lt;/li&gt;\n&lt;/ul&gt;\n&#34;,&#34;fileName&#34;:&#34;xiang-jie-tcp-ru-he-ying-dui-san-ci-wo-shou-he-si-ci-hui-shou-guo-cheng-zhong-de-diu-bao&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;详解TCP如何应对三次握手和四次挥手过程中的丢包&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;网络&#34;,&#34;slug&#34;:&#34;_lSk0csRV&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://cknightx.github.io/tag/_lSk0csRV/&#34;}],&#34;date&#34;:&#34;2021-04-14 21:10:06&#34;,&#34;dateFormat&#34;:&#34;2021-04-14&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://cknightx.github.io/post/xiang-jie-tcp-ru-he-ying-dui-san-ci-wo-shou-he-si-ci-hui-shou-guo-cheng-zhong-de-diu-bao/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;3 min read&#34;,&#34;time&#34;:138000,&#34;words&#34;:634,&#34;minutes&#34;:3},&#34;description&#34;:&#34;\n三次握手\n\n\n客户端SYN丢包\n\n\n客户端：在超时时间内没收到服务端的ACK，就会超时重传SYN数据包。\n服务端：无感知\n\n\n服务端SYN ACK丢包\n\n\n客户端：认为服务端没收到SYN，所以触发重传，与1一致。\n服务端：在超时时间没有收...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%89%E6%AC%A1%E6%8F%A1%E6%89%8B\&#34;&gt;三次握手&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9B%9B%E6%AC%A1%E6%8C%A5%E6%89%8B\&#34;&gt;四次挥手&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;这题就是回溯，但是看面经考察还蛮频繁的，所以记录一下。&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-c++\&#34;&gt;class Solution {\npublic:\n    vector&amp;lt;string&amp;gt; res;\n    vector&amp;lt;string&amp;gt; restoreIpAddresses(string s) {\n        if (s.size()&amp;gt;12 || s.size()&amp;lt;4) return {};\n        vector&amp;lt;string&amp;gt; tmp;\n        dfs(s,0,tmp);\n        return res;\n    }\n    void dfs(const string&amp;amp; s,int index,vector&amp;lt;string&amp;gt;&amp;amp; tmp)\n    {\n        // 超过了4段，guna！\n        if (tmp.size()&amp;gt;4) return;\n        // 处理完整个串，且刚好有4段，说明得到了一个正确结果\n        if (index&amp;gt;=s.size() &amp;amp;&amp;amp; tmp.size()==4)\n        {\n            string ip_address;\n            for (int i=0;i&amp;lt;tmp.size()-1;++i)\n            {\n                ip_address.append(tmp[i]);\n                ip_address.push_back(&#39;.&#39;);\n            }\n            ip_address.append(tmp.back());\n            res.push_back(ip_address);\n            return;\n        }\n        // 每次尝试选取1-3个字符作为一段\n        for (int i=1;i&amp;lt;=3;++i)\n        {\n            if (index+i&amp;gt;s.size()) break;\n            auto token=s.substr(index,i);\n            // 排除xxx.011.xxx\n            if (token.size()&amp;gt;1 &amp;amp;&amp;amp; token[0]==&#39;0&#39;) break;3\n            // 排除xxx.512.xxx\n            if (stoi(token)&amp;gt;255) break;\n            tmp.push_back(token);\n            dfs(s,index+i,tmp);\n            tmp.pop_back();\n        }\n    }\n};\n&lt;/code&gt;&lt;/pre&gt;\n&#34;,&#34;fileName&#34;:&#34;leetcode93-fu-yuan-ip-di-zhi&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;leetcode93. 复原IP地址&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;算法&#34;,&#34;slug&#34;:&#34;IljIGIEjm&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://cknightx.github.io/tag/IljIGIEjm/&#34;}],&#34;date&#34;:&#34;2021-04-14 15:17:03&#34;,&#34;dateFormat&#34;:&#34;2021-04-14&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://cknightx.github.io/post/leetcode93-fu-yuan-ip-di-zhi/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:70000,&#34;words&#34;:219,&#34;minutes&#34;:2},&#34;description&#34;:&#34;这题就是回溯，但是看面经考察还蛮频繁的，所以记录一下。\nclass Solution {\npublic:\n    vector&amp;lt;string&amp;gt; res;\n    vector&amp;lt;string&amp;gt; restoreIpAdd...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;h1 id=\&#34;lru\&#34;&gt;LRU&lt;/h1&gt;\n&lt;p&gt;LRU(Least Recently Used)，即最近最少使用。其主要思想是：如果数据最近被访问过，那么将来被访问的几率也更高。&lt;br&gt;\n使用双向链表存储，用unordered_map作索引，以实现O(1)的查询和置换。&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-c++\&#34;&gt;using Node = pair&amp;lt;int, int&amp;gt;;\n\nclass LRUCache\n{\npublic:\n\tLRUCache(int capacity)\n\t\t:capacity_(capacity){}\n\tvoid set(int key,int value)\n\t{\n\t\tauto iter = mp_.find(key);\n\t\t// 在缓存中\n\t\tif (iter != mp_.end())\n\t\t{\n\t\t\t// 将页面移动至链表头部\n\t\t\tlist_.erase(iter-&amp;gt;second);\n\t\t\tlist_.emplace_back(key, value);\n\t\t\tmp_[key] = list_.begin();\n\t\t}\n\t\t// 不在缓存中\n\t\telse\n\t\t{\n\t\t\t// 缓存空间满\n\t\t\tif (list_.size() &amp;gt;= capacity_)\n\t\t\t{\n\t\t\t\t// 删除链表尾部页面，以及mp中的缓存\n\t\t\t\tmp_.erase(list_.back().first);\n\t\t\t\tlist_.pop_back();\n\t\t\t}\n\t\t\t// 装入新页面\n\t\t\tlist_.emplace_front(key, value);\n\t\t\tmp_[key] = list_.begin();\n\t\t}\n\t}\n\tint get(int key)\n\t{\n\t\tauto iter = mp_.find(key);\n\t\t// 页面不存在\n\t\tif (iter == mp_.end())\n\t\t{\n\t\t\treturn -1;\n\t\t}\n\t\t// 页面存在，要将其移动至链表头部\n\t\tlist_.emplace_front(key, iter-&amp;gt;second-&amp;gt;second);\n\t\tlist_.erase(iter-&amp;gt;second);\n\n\t\tmp_[key] = list_.begin();\n\t\treturn iter-&amp;gt;second-&amp;gt;second;\n\t}\nprivate:\n\tint capacity_;\n\tint node_num_;\n\tlist&amp;lt;Node&amp;gt; list_;\n\tunordered_map&amp;lt;int, list&amp;lt;Node&amp;gt;::iterator&amp;gt; mp_;\n};\nint main()\n{\n\tLRUCache lru(2);\n\tlru.set(1, 1);\n\tlru.set(2, 2);\n\tcout &amp;lt;&amp;lt; lru.get(1)&amp;lt;&amp;lt;endl;\n\tlru.set(3, 3);\n\tcout &amp;lt;&amp;lt; lru.get(2)&amp;lt;&amp;lt;endl;\n\tlru.set(4, 4);\n\tcout &amp;lt;&amp;lt; lru.get(1)&amp;lt;&amp;lt;endl;\n\tcout &amp;lt;&amp;lt; lru.get(3)&amp;lt;&amp;lt;endl;\n\tcout &amp;lt;&amp;lt; lru.get(4)&amp;lt;&amp;lt;endl;\n\tcin.get();\n    // 1 -1 -1 3 4\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h1 id=\&#34;lfu\&#34;&gt;LFU&lt;/h1&gt;\n&lt;p&gt;LFU(Least frequently used)，最不经常使用。其主要思想是：如果一个数据在最近一段时间内使用次数很少，那么在将来一段时间内被使用的可能性也很小。&lt;br&gt;\n使用双ordered_map，一个用来查找对应页面，一个用来查找对应计数的页面链表&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-c++\&#34;&gt;struct Node\n{\n\tint key, value, count;\n\tNode(int k,int v,int c):key(k),value(v),count(c){}\n};\nclass LFUCache\n{\npublic:\n\tLFUCache(int capacity)\n\t\t:capacity_(capacity){}\n\tint get(int key)\n\t{\n\t\tauto iter = mp_key.find(key);\n\t\t// 页面存在\n\t\tif (iter != mp_key.end())\n\t\t{\n\t\t\tint cnt = iter-&amp;gt;second-&amp;gt;count;\n\t\t\tint val = iter-&amp;gt;second-&amp;gt;value;\n\t\t\t// 访问次数+1，放到对应的链表头部\n\t\t\tmp_count[cnt + 1].emplace_front(iter-&amp;gt;second-&amp;gt;key,val, cnt + 1);\n\t\t\tmp_count[cnt].erase(iter-&amp;gt;second);\n\t\t\t// 更新最小访问次数，如果访问为N次的页面已经全部被移除，则最小访问次数为N+1\n\t\t\tif (min_count_ == cnt &amp;amp;&amp;amp; mp_count[cnt].empty())\n\t\t\t\t++min_count_;\n\t\t\tmp_key[key] = mp_count[cnt + 1].begin();\n\t\t\treturn val;\n\t\t}\n\t\treturn -1;\n\t}\n\tvoid set(int key, int value)\n\t{\n\t\tauto iter = mp_key.find(key);\n\t\t// 更新\n\t\tif (iter != mp_key.end())\n\t\t{\n\t\t\tget(key);\n\t\t\tauto new_pos_iter = mp_key[key];\n\t\t\tnew_pos_iter-&amp;gt;value = value;\n\t\t}\n\t\t// 插入新节点\n\t\telse\n\t\t{\n\t\t\t// 满了\n\t\t\tif (mp_key.size() &amp;gt;= capacity_)\n\t\t\t{\n\t\t\t\t// 删除计数最少且最早出现的\n\t\t\t\tint need_delete_key = mp_count[min_count_].back().key;\n\t\t\t\tmp_count[min_count_].pop_back();\n\t\t\t\tmp_key.erase(need_delete_key);\n\t\t\t}\n\t\t\t// 新加入的引用计数为1\n\t\t\tmp_count[1].emplace_front(key, value, 1);\n\t\t\tmp_key[key] = mp_count[1].begin();\n\t\t\t// 插入新节点，所以最小计数必然为1\n\t\t\tmin_count_ = 1;\n\t\t}\n\t}\nprivate:\n\tunordered_map&amp;lt;int, list&amp;lt;Node&amp;gt;::iterator&amp;gt; mp_key;\n\tunordered_map&amp;lt;int, list&amp;lt;Node&amp;gt;&amp;gt; mp_count;\n\tint min_count_ = 1;\n\tint capacity_;\n};\n\nint main()\n{\n\tLFUCache lfu(2);\n\tlfu.set(1, 1);\n\tlfu.set(2, 2);\n\tcout &amp;lt;&amp;lt; lfu.get(1) &amp;lt;&amp;lt; endl;\n\tlfu.set(3, 3);\n\tcout &amp;lt;&amp;lt; lfu.get(2) &amp;lt;&amp;lt; endl;\n\tcout &amp;lt;&amp;lt; lfu.get(3) &amp;lt;&amp;lt; endl;\n\tlfu.set(4, 4);\n\tcout &amp;lt;&amp;lt; lfu.get(1) &amp;lt;&amp;lt; endl;\n\tcout &amp;lt;&amp;lt; lfu.get(3) &amp;lt;&amp;lt; endl;\n\tcout &amp;lt;&amp;lt; lfu.get(4) &amp;lt;&amp;lt; endl;\n\tcin.get();\n\t// 1 -1 3 -1 3 4\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h1 id=\&#34;区别\&#34;&gt;区别&lt;/h1&gt;\n&lt;p&gt;二者的区别主要在于，LRU以最近使用时间为参考，LFU以引用计数和最近使用时间两个维度为参考。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;lru-yu-lfu-suan-fa-shi-xian&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;LRU与LFU算法实现&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;操作系统&#34;,&#34;slug&#34;:&#34;NQui_4wp5&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://cknightx.github.io/tag/NQui_4wp5/&#34;}],&#34;date&#34;:&#34;2021-04-14 09:08:28&#34;,&#34;dateFormat&#34;:&#34;2021-04-14&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://cknightx.github.io/post/lru-yu-lfu-suan-fa-shi-xian/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;5 min read&#34;,&#34;time&#34;:243000,&#34;words&#34;:805,&#34;minutes&#34;:5},&#34;description&#34;:&#34;LRU\nLRU(Least Recently Used)，即最近最少使用。其主要思想是：如果数据最近被访问过，那么将来被访问的几率也更高。\n使用双向链表存储，用unordered_map作索引，以实现O(1)的查询和置换。\nusing No...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#lru\&#34;&gt;LRU&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#lfu\&#34;&gt;LFU&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%8C%BA%E5%88%AB\&#34;&gt;区别&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;正在学习C++后台开发的渣渣&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;about&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;关于&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2019-01-25 19:09:48&#34;,&#34;dateFormat&#34;:&#34;2019-01-25&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://cknightx.github.io/post/about/&#34;,&#34;hideInList&#34;:true
